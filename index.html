<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Media Reach Analysis</title>
    <!-- यहाँ हम CSS फाइल को लिंक कर रहे हैं -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard">
        <h2>Reach Analyzer</h2>
        <p style="text-align:center; color:#555; font-size:14px;">पोस्ट का डेटा एंटर करें</p>

        <div class="form-group">
            <label for="followers">Total Followers (कुल फॉलोअर्स):</label>
            <input type="number" id="followers" placeholder="e.g., 5000">
        </div>

        <div class="form-group">
            <label for="likes">Total Likes (कुल लाइक्स):</label>
            <input type="number" id="likes" placeholder="e.g., 200">
        </div>

        <div class="form-group">
            <label for="comments">Total Comments (कुल कमेंट्स):</label>
            <input type="number" id="comments" placeholder="e.g., 50">
        </div>

        <div class="form-group">
            <label for="shares">Total Shares (कुल शेयर्स):</label>
            <input type="number" id="shares" placeholder="e.g., 20">
        </div>

        <button onclick="analyzeReach()">Analyze Reach</button>

        <div class="result-box" id="resultDisplay"></div>
    </div>

    <!-- यहाँ हम JavaScript फाइल को लिंक कर रहे हैं -->
    <script src="script.js"></script>
</body>
</html>
